<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --cell: 82px; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f0ebe0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: #2c5f2e;
  color: white;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.35);
  z-index: 10;
}
.header h1 { font-size: 1.1rem; font-weight: 600; }
.header .sfg-tag {
  background: rgba(255,255,255,0.15);
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.header .hint { margin-left: auto; font-size: 0.72rem; opacity: 0.65; }

/* ── Layout ── */
.layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 110px;
  background: white;
  border-right: 1px solid #ddd6c8;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-title {
  padding: 9px 10px 7px;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #999;
  border-bottom: 1px solid #f0ebe0;
  flex-shrink: 0;
}
.sidebar-list { overflow-y: auto; flex: 1; padding: 5px 6px; }

.section-header {
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: #bbb;
  padding: 7px 4px 3px;
}

.plant-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 4px 5px;
  border-radius: 6px;
  margin-bottom: 2px;
  cursor: grab;
  border: 1.5px solid transparent;
  transition: background 0.12s, border-color 0.12s;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  position: relative;
}
.plant-item:hover { background: #f5f0e8; border-color: #e0d8cc; }
.plant-item.dragging-source { opacity: 0.35; }

.pi-emoji { width: 30px; height: 30px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.pi-info { width: 100%; text-align: center; }
.pi-name { font-size: 0.63rem; font-weight: 500; color: #333; white-space: normal; line-height: 1.2; text-align: center; overflow: visible; }
.pi-sfg { display: none; }
.pi-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  font-size: 0.5rem;
  font-weight: 700;
  color: #2c5f2e;
  background: #e8f5e9;
  padding: 0px 3px;
  border-radius: 8px;
  white-space: nowrap;
  line-height: 1.5;
}

/* ── Content ── */
.content { flex: 1; min-height: 0; overflow: auto; padding: 16px 20px 60px; }

.beds-grid {
  display: grid;
  grid-template-columns: repeat(2, auto);
  gap: 22px;
  width: fit-content;
}

/* ── Bed wrapper ── */
.bed-wrap { display: flex; flex-direction: column; gap: 6px; }

.bed-label-row {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 22px;
}

.bed-name {
  font-size: 0.78rem;
  font-weight: 600;
  color: #2c5f2e;
  cursor: text;
  border: 1px solid transparent;
  padding: 1px 4px;
  border-radius: 3px;
  outline: none;
  white-space: nowrap;
}
.bed-name:hover { border-color: #ccc; background: white; }
.bed-name:focus { border-color: #2c5f2e; background: white; }

.bed-stats { font-size: 0.62rem; color: #aaa; white-space: nowrap; }

.bed-clear {
  font-size: 0.62rem;
  color: #c0392b;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid #c0392b;
  white-space: nowrap;
  user-select: none;
}
.bed-wrap:hover .bed-clear { opacity: 0.65; }
.bed-clear:hover { opacity: 1 !important; background: #fdecea; }
.bed-dims { font-size: 0.62rem; color: #ccc; margin-left: auto; white-space: nowrap; }

/* ── Bed grid ── */
.bed {
  display: grid;
  grid-template-columns: repeat(6, var(--cell));
  grid-template-rows: repeat(3, var(--cell));
  gap: 3px;
  padding: 4px;
  background: #7a4f28;
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  width: fit-content;
}

/* ── Square foot cell ── */
.sq-cell {
  width: var(--cell);
  height: var(--cell);
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: default;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  background: #c8976a;
  transition: filter 0.1s;
  overflow: hidden;
}

.sq-cell.empty {
  background: rgba(180,120,60,0.45);
  cursor: default;
}
.sq-cell.empty::after {
  content: '+';
  font-size: 22px;
  color: rgba(255,255,255,0.25);
  font-weight: 300;
}

.sq-cell.filled {
  cursor: grab;
  border: 2px solid transparent;
}
.sq-cell.filled:hover { filter: brightness(0.92); }

/* Highlight states during drag */
.sq-cell.will-place   { outline: 3px solid #27ae60; outline-offset: -3px; }
.sq-cell.will-replace { outline: 3px solid #e67e22; outline-offset: -3px; }

.sq-cell .cell-emoji { pointer-events: none; display: flex; align-items: center; justify-content: center; }
.sq-cell .cell-name {
  font-size: 9px;
  font-weight: 500;
  color: rgba(0,0,0,0.6);
  text-align: center;
  margin-top: 2px;
  pointer-events: none;
  white-space: nowrap;
  overflow: hidden;
  max-width: 78px;
  text-overflow: ellipsis;
}
.sq-cell .cell-count {
  font-size: 15px;
  font-weight: 800;
  color: rgba(0,0,0,0.75);
  margin-top: 1px;
  pointer-events: none;
  line-height: 1;
}

.sq-cell .x-btn {
  display: none;
  position: absolute;
  top: 2px; right: 2px;
  width: 15px; height: 15px;
  font-size: 11px; line-height: 15px;
  text-align: center;
  background: rgba(192,57,43,0.9);
  color: white;
  border-radius: 50%;
  cursor: pointer;
  font-weight: 700;
  z-index: 20;
}
.sq-cell.filled:hover .x-btn { display: block; }

/* ── Drag ghost ── */
#drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 82px;
  height: 82px;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0.85;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  border: 2px solid transparent;
}
#drag-ghost .g-emoji { display: flex; align-items: center; justify-content: center; }
#drag-ghost .g-count { font-size: 15px; font-weight: 800; color: rgba(0,0,0,0.7); margin-top: 2px; }

/* ── Smart Fill ── */
.sf-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 200; }
.sf-overlay.hidden { display: none; }
.sf-card { background: #fff; border-radius: 10px; padding: 20px 22px; width: 360px; max-width: 90vw; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
.sf-title { font-size: 0.95rem; font-weight: 700; color: #2c5f2e; margin-bottom: 12px; }
.sf-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; display: block; margin-bottom: 5px; }
.sf-select { width: 100%; padding: 6px 8px; border: 1.5px solid #ddd; border-radius: 5px; font-size: 0.85rem; color: #333; margin-bottom: 10px; }
.sf-row-preview { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f5f0e8; font-size: 0.78rem; }
.sf-row-preview:last-child { border-bottom: none; }
.sf-row-dir { color: #bbb; font-size: 0.62rem; flex-shrink: 0; width: 84px; }
.sf-row-plants { color: #333; font-weight: 500; }
.sf-empty { color: #bbb !important; font-weight: 400 !important; font-style: italic; }
.sf-no-plants { color: #c0392b; font-size: 0.78rem; padding: 8px 0; text-align: center; }
.sf-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.sf-btn { padding: 6px 14px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #555; }
.sf-btn:hover { background: #f5f5f5; }
.sf-btn.primary { background: #2c5f2e; border-color: #2c5f2e; color: #fff; font-weight: 600; }
.sf-btn.primary:hover { background: #3a7d3c; }
.bed-smartfill { font-size: 0.62rem; color: #2c5f2e; cursor: pointer; opacity: 0; transition: opacity 0.2s; padding: 1px 5px; border-radius: 3px; border: 1px solid #2c5f2e; white-space: nowrap; user-select: none; }
.bed-wrap:hover .bed-smartfill { opacity: 0.7; }
.bed-smartfill:hover { opacity: 1 !important; background: #e8f5e9; }
.bed-compass { font-size: 0.58rem; color: #bbb; letter-spacing: 0.04em; display: flex; justify-content: space-between; padding: 1px 4px; }

/* ── Bed guidance ── */
.bed-guidance {
  font-size: 0.67rem;
  color: #444;
  background: #f7f3ec;
  border: 1px solid #e0d8cc;
  border-radius: 5px;
  padding: 6px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  line-height: 1.4;
}
.bed-guidance-item { display: flex; align-items: flex-start; gap: 5px; }
.bed-guidance-icon { flex-shrink: 0; font-size: 0.8rem; }
.bed-guidance-warn { color: #8b3a0f; }
.bed-guidance-good { color: #1b5e20; }
.bed-suggest-tag {
  display: inline-block;
  position: relative;
  cursor: help;
  border-bottom: 1px dotted #999;
  white-space: nowrap;
}
.bed-suggest-tag::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  background: #2c3e50;
  color: #fff;
  font-size: 0.62rem;
  line-height: 1.45;
  padding: 6px 10px;
  border-radius: 5px;
  width: 190px;
  white-space: normal;
  z-index: 500;
  pointer-events: none;
  box-shadow: 0 3px 12px rgba(0,0,0,0.25);
  opacity: 0;
  transition: opacity 0.15s;
}
.bed-suggest-tag::before {
  content: '';
  position: absolute;
  bottom: calc(100% + 2px);
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #2c3e50;
  z-index: 500;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.bed-suggest-tag:hover::after,
.bed-suggest-tag:hover::before { opacity: 1; }

/* ── Plant sidebar tooltip popup ── */
.plant-tip-popup {
  position: fixed;
  background: #2c3e50;
  color: #fff;
  font-size: 0.65rem;
  line-height: 1.55;
  padding: 9px 12px;
  border-radius: 7px;
  width: 220px;
  white-space: pre-line;
  z-index: 600;
  pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transform: translateY(-50%);
}
.plant-tip-popup::before {
  content: '';
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translateY(-50%);
  border: 6px solid transparent;
  border-right-color: #2c3e50;
}

/* ── Plant marking ── */
.pi-dot { position: absolute; top: 5px; left: 5px; width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid #ccc; cursor: pointer; transition: background 0.12s, border-color 0.12s; }
.pi-dot.marked { background: #2c5f2e; border-color: #2c5f2e; }
.plant-item:hover .pi-dot:not(.marked) { border-color: #888; }
.plant-item.fav { background: #f0fbf5; border-color: #c8e6c9 !important; }
.sidebar-fav-count { font-size: 0.6rem; color: #888; font-weight: 400; text-transform: none; letter-spacing: 0; }
.sidebar-fav-clear { font-size: 0.6rem; color: #c0392b; cursor: pointer; margin-left: 6px; opacity: 0.7; }
.sidebar-fav-clear:hover { opacity: 1; }
.sf-using { font-size: 0.68rem; color: #888; margin-bottom: 8px; }
.pi-fill { position: absolute; top: 17px; right: 3px; font-size: 0.48rem; color: #2c5f2e; cursor: pointer; opacity: 0; transition: opacity 0.12s; padding: 0px 3px; border-radius: 3px; border: 1px solid #2c5f2e; white-space: nowrap; line-height: 1.5; }
.plant-item:hover .pi-fill { opacity: 0.65; }
.pi-fill:hover { opacity: 1 !important; background: #e8f5e9; }
.fill-dd { position: fixed; background: white; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 300; padding: 4px 0; min-width: 120px; }
.fill-dd-item { padding: 6px 14px; font-size: 0.78rem; cursor: pointer; color: #333; white-space: nowrap; }
.fill-dd-item:hover { background: #f0fbf5; color: #2c5f2e; }

/* ── Growing Plan ── */
.plan-section { display: block; margin-top: 28px; border-radius: 10px; border: 1.5px solid #dce8dc; overflow: hidden; }
.plan-section-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #eef4ee; }
.plan-section-title { font-size: 0.85rem; font-weight: 700; color: #2c5f2e; }
.plan-now { padding: 12px 18px; background: #f0fbf5; border-bottom: 1px solid #d4edda; }
.plan-now-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #2c5f2e; margin-bottom: 8px; }
.plan-now-empty { font-size: 0.78rem; color: #aaa; }
.plan-actions-list { display: flex; flex-direction: column; gap: 5px; }
.plan-action { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; color: #333; }
.plan-action-tag { font-size: 0.58rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.tag-sow { background: #fff3e0; color: #e65100; }
.tag-plant { background: #e8f5e9; color: #1b5e20; }
.tag-harvest { background: #e3f2fd; color: #1565c0; }
.tag-succession { background: #fce4ec; color: #880e4f; }
.tag-feed { background: #efebe9; color: #4e342e; }
.plan-gantt { padding: 14px 18px 4px; overflow-x: auto; }
.plan-gantt-inner { min-width: 520px; }
.plan-tl-wrap { position: relative; }
.plan-backdrop { position: absolute; left: 130px; right: 0; top: 0; bottom: 0; pointer-events: none; z-index: 0; }
.plan-grid-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #f0ede8; }
.plan-grid-today { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(231,76,60,0.28); }
.plan-row { display: flex; align-items: center; min-height: 28px; position: relative; z-index: 1; }
.plan-row-label { width: 130px; min-width: 130px; display: flex; align-items: flex-start; gap: 5px; padding-right: 8px; }
.plan-row-icon { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
.plan-row-name { font-size: 0.68rem; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.plan-date-wrap { margin-top: 3px; }
.plan-date-selects { display: flex; gap: 3px; align-items: center; }
.plan-date-sel { font-size: 0.55rem; border: 1px solid #ddd; border-radius: 3px; padding: 2px 2px; color: #666; background: #fafafa; cursor: pointer; -webkit-appearance: auto; }
.plan-date-chip { display: flex; align-items: center; gap: 4px; background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 4px; padding: 2px 5px; }
.plan-date-chip-label { font-size: 0.55rem; color: #2c5f2e; font-weight: 600; }
.plan-date-chip-clear { background: none; border: none; font-size: 0.75rem; line-height: 1; color: #2c5f2e; cursor: pointer; padding: 0 2px; font-weight: 700; }
.plan-date-chip-clear:active { color: #c62828; }
.plan-row-bars { flex: 1; }
.plan-bars-track { position: relative; height: 12px; }
.plan-bar { position: absolute; height: 100%; border-radius: 3px; min-width: 3px; }
.plan-month-bar { height: 22px; position: relative; }
.plan-month-lbl { position: absolute; font-size: 0.55rem; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; transform: translateX(-50%); top: 4px; white-space: nowrap; }
.bar-sow { background: #ff9800; }
.bar-grow { background: #a5d6a7; }
.bar-harvest { background: #2e7d32; }
.bar-overwinter { background: repeating-linear-gradient(60deg,#a5d6a7 0,#a5d6a7 5px,#c8e6c9 5px,#c8e6c9 10px); }
.bar-grow2 { background: #a5d6a7; opacity: 0.55; }
.bar-harvest2 { background: #2e7d32; opacity: 0.45; }
.plan-succ-row { display: flex; align-items: center; min-height: 20px; }
.plan-succ-row-label { width: 130px; min-width: 130px; display: flex; align-items: center; gap: 4px; padding-right: 8px; padding-left: 14px; }
.plan-succ-row-arrow { font-size: 0.65rem; color: #bbb; flex-shrink: 0; }
.plan-succ-row-name { font-size: 0.6rem; color: #558b2f; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.plan-legend { display: flex; flex-wrap: wrap; gap: 14px; padding: 10px 18px 16px; border-top: 1px solid #f5f0e8; }
.plan-legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.62rem; color: #666; }
.plan-legend-dot { width: 14px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.plan-empty { padding: 28px 18px; text-align: center; color: #aaa; font-size: 0.85rem; }

/* ── Sync button ── */
.sync-btn {
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 5px;
  padding: 4px 10px;
  font-size: 0.72rem;
  cursor: pointer;
  white-space: nowrap;
  margin-left: 8px;
  flex-shrink: 0;
}
.sync-btn:hover { background: rgba(255,255,255,0.25); }
.sync-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4caf50;
  margin-right: 4px;
  vertical-align: middle;
}

/* ── Responsive / Mobile ── */
@media (max-width: 767px) {
  body { height: 100vh; overflow: hidden; }
  .header { padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
  .header h1 { font-size: 0.9rem; }
  .header .hint, .header [style*="opacity:0.45"] { display: none; }
  .layout { flex-direction: row; overflow: hidden; height: 100%; }
  .sidebar { width: 75px; min-width: 75px; max-width: 75px; border-right: 1px solid #ddd6c8; border-bottom: none; overflow-y: auto; overflow-x: hidden; flex-shrink: 0; }
  .sidebar-title { display: none; }

  .sq-cell .cell-emoji { height: auto; }
  .sq-cell .cell-name { font-size: 5px; max-width: calc(var(--cell) - 4px); margin-top: 1px; }
  .sq-cell .cell-count { font-size: 9px; }
  .sq-cell.empty::after { font-size: 12px; }
  .sq-cell .x-btn { width: 12px; height: 12px; font-size: 8px; line-height: 12px; top: 1px; right: 1px; }
  .bed-clear, .bed-smartfill { opacity: 0.65; }
  .bed-dims { display: none; }
  .bed-compass { font-size: 0.5rem; }
  .bed-guidance { font-size: 0.58rem; padding: 4px 7px; }
  .sf-card { width: 92vw; max-width: 92vw; }
}

function plantIcon(def, size) {
  const svg = PLANT_SVG[def.id];
  if (svg) {
    return `<img src="data:image/svg+xml,${encodeURIComponent(svg)}" width="${size}" height="${size}" alt="${def.name}" style="display:block">`;
  }
  const pts = [...def.emoji]
    .map(c => c.codePointAt(0).toString(16).toUpperCase())
    .filter(cp => cp !== 'FE0F');
  const url = `https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/${pts.join('-')}.svg`;
  return `<img src="${url}" width="${size}" height="${size}" alt="${def.name}" style="display:block">`;
}

function applyState(d) {
  if (Array.isArray(d.beds)) beds = d.beds;

  if (d.plantedDates && typeof d.plantedDates === 'object') plantedDates = d.plantedDates;
  if (typeof d.lastModified === 'number') lastModified = d.lastModified;
  beds.forEach(b => {
    if (!Array.isArray(b.cells) || b.cells.length !== GRID_TOTAL) {
      b.cells = Array(GRID_TOTAL).fill(null);

  lastModified = Date.now();

/* ── Gist sync ── */
async function syncToGist() {
  const pat = localStorage.getItem('sfg-gist-pat');
  const gistId = localStorage.getItem('sfg-gist-id');
  if (!pat || !gistId) return;
  const payload = JSON.stringify({ beds, favPlants: [...favPlants], plantedDates, lastModified });
  const res = await fetch(`https://api.github.com/gists/${gistId}`, {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${pat}`, 'Content-Type': 'application/json', 'X-GitHub-Api-Version': '2022-11-28' },
    body: JSON.stringify({ files: { 'sfg-planner.json': { content: payload } } })
  });
  if (res.ok) {
    updateSyncStatus('Synced ' + new Date().toLocaleTimeString());
    setSyncIndicator(true);
  } else {
    updateSyncStatus('Sync error ' + res.status);
  }
}

async function syncFromGist() {
  const pat = localStorage.getItem('sfg-gist-pat');
  const gistId = localStorage.getItem('sfg-gist-id');
  if (!pat || !gistId) return null;
  const res = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { Authorization: `Bearer ${pat}`, 'X-GitHub-Api-Version': '2022-11-28' }
  });
  if (!res.ok) return null;
  const data = await res.json();
  const file = data.files && data.files['sfg-planner.json'];
  if (!file) return null;
  return JSON.parse(file.content);
}

function bedStats(bed) {
  const filled = bed.cells.filter(Boolean).length;
  const totalPlants = bed.cells.reduce((s, c) => {
    if (!c) return s;
    const d = plantDef(c.type);
    return s + (d ? d.perSqFt : 0);
  }, 0);
  return { filled, totalPlants };
}

/* ── Smart Fill ── */
const MONTH_SHORT = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function companionScore(plant, selectedIds) {
  let score = 0;
  selectedIds.forEach(id => {
    if (plant.companions.includes(id)) score += 2;
    if (plant.avoid.includes(id))      score -= 4;
    const other = plantDef(id);
    if (other) {
      if (other.companions.includes(plant.id)) score += 1;
      if (other.avoid.includes(plant.id))      score -= 4;
    }
  });
  return score;
}

function selectBestPlants(candidates, count, alreadyIds) {
  // Shuffle first so ties produce variety across calls
  const pool = [...candidates].sort(() => Math.random() - 0.5);
  const chosen = [];
  while (chosen.length < count && pool.length > 0) {
    const ctx = [...alreadyIds, ...chosen.map(p => p.id)];
    let best = -1, bestScore = -Infinity;
    pool.forEach((p, i) => {
      const s = companionScore(p, ctx);
      if (s > bestScore) { bestScore = s; best = i; }
    });
    if (best === -1) break;
    if (bestScore >= -2 || chosen.length === 0) {
      chosen.push(pool.splice(best, 1)[0]);
    } else {
      break; // remaining plants all conflict
    }
  }
  return chosen;
}

// Beds are landscape: left = North, right = South.
// Tall plants go in left columns so they don't shadow south-side plants.
// Layout: cols 0-1 = tall (N), cols 2-3 = medium, cols 4-5 = low (S).
function buildColumnFill(tallPicks, medPicks, lowPicks) {
  const cells = Array(18).fill(null);
  const assignZone = (picks, startCol) => {
    const a = picks[0] || null;
    const b = picks[1] || picks[0] || null; // repeat first if only one variety
    for (let row = 0; row < GRID_ROWS; row++) {
      if (a) cells[row * GRID_COLS + startCol]     = { type: a.id };
      if (b) cells[row * GRID_COLS + startCol + 1] = { type: b.id };
    }
  };
  assignZone(tallPicks, 0); // cols 0-1
  assignZone(medPicks,  2); // cols 2-3
  assignZone(lowPicks,  4); // cols 4-5
  return cells;
}

function computeFill(month) {
  const source = favPlants.size > 0 ? PLANTS.filter(p => favPlants.has(p.id)) : PLANTS;
  const ok   = source.filter(p => p.outdoorMonth <= month);
  const tall = ok.filter(p => p.height === 'tall');
  const med  = ok.filter(p => p.height === 'medium');
  const low  = ok.filter(p => p.height === 'low');
  const tallPicks = selectBestPlants(tall, 2, []);
  const medPicks  = selectBestPlants(med,  2, tallPicks.map(p => p.id));
  const allSoFar  = [...tallPicks, ...medPicks].map(p => p.id);
  const lowPicks  = selectBestPlants(low,  2, allSoFar);
  return { tallPicks, medPicks, lowPicks };
}

let sfBedId = null, sfPicks = null;

function openSmartFill(bed) {
  sfBedId = bed.id;
  document.getElementById('sf-bed-name').textContent = bed.name;

}

function refreshSfPreview() {
  const month = +document.getElementById('sf-month').value;
  sfPicks = computeFill(month);
  const { tallPicks, medPicks, lowPicks } = sfPicks;
  const usingEl = document.getElementById('sf-using');
  if (usingEl) usingEl.textContent = favPlants.size > 0
    ? `Using ${favPlants.size} marked plant${favPlants.size !== 1 ? 's' : ''}`
    : 'Using all plants';
  const el = document.getElementById('sf-preview');
  if (!tallPicks.length && !medPicks.length && !lowPicks.length) {
    el.innerHTML = `<p class="sf-no-plants">No plants can go outside in Denmark this month.</p>`;
    return;
  }
  const row = (dir, picks) => {
    const names = picks.length
      ? `<span class="sf-row-plants">${picks.map(p => p.name).join(', ')}</span>`
      : `<span class="sf-row-plants sf-empty">none available yet</span>`;
    return `<div class="sf-row-preview"><span class="sf-row-dir">${dir}</span>${names}</div>`;
  };
  el.innerHTML = row('← N (tall)', tallPicks) + row('middle', medPicks) + row('S → (low)', lowPicks);
}

function applySfFill() {
  if (!sfPicks) return;
  const bed = bedById(sfBedId);
  if (!bed) return;
  if (bed.cells.some(Boolean) && !confirm(`Replace all plants in "${bed.name}"?`)) return;
  bed.cells = buildColumnFill(sfPicks.tallPicks, sfPicks.medPicks, sfPicks.lowPicks);
  saveState();
  renderBeds();
  document.getElementById('sf-overlay').classList.add('hidden');
}

function doy(month, day) {

}
function pct(d) { return (((d - PLAN_S) / PLAN_D) * 100).toFixed(2); }
function todayDOY() {

function succSuggestions(plantId, harvestStartDoy) {
  const list = SUCCESSION[plantId] || [];
  const results = [];
  let nextSow = harvestStartDoy;
  for (const sid of list) {
    const t = PLANT_TIMING[sid];
    if (!t) continue;
    const growEnd = nextSow + t.days;
    if (growEnd >= SEASON_END) continue; // won't reach harvest before season ends
    const harvEnd = Math.min(growEnd + t.harvest * 7, SEASON_END + 14);
    results.push({ id: sid, sowS: nextSow, growE: growEnd, harvE: harvEnd });
    nextSow = growEnd; // next crop sows when this one starts harvesting
    if (results.length >= 2 || nextSow >= SEASON_END) break;
  }
  return results;
}

function doyToDateStr(year, d) {
  const dt = new Date(year, 0, d);
  return `${year}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function dateToDOY(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  let result = d;
  for (let i = 0; i < m - 1; i++) result += MONTH_LEN[i];
  return result;
}

function renderPlanBody() {
  const todayD = todayDOY();
  const curMonth = new Date().getMonth() + 1;
  const year = new Date().getFullYear();
  const seen = new Set();
  beds.forEach(bed => bed.cells.forEach(c => c && seen.add(c.type)));

  const planBody = document.getElementById('planBody');
  if (!seen.size) {
    planBody.innerHTML = '<div class="plan-empty">Add plants to your beds to see the growing plan.</div>';
    return;
  }

  const rows = [], actions = [], actSeen = new Set();

  seen.forEach(id => {
    const def = plantDef(id);
    const t = PLANT_TIMING[id];
    if (!def || !t) return;

    const planted = plantedDates[id];
    let outdoorD = planted ? dateToDOY(planted) : doy(def.outdoorMonth, 15);
    if (def.overwinter) outdoorD -= 365; // planted last autumn — shift to negative DOY
    const preGermD = outdoorD - t.preGerm * 7;
    const harvestS = outdoorD + t.days;
    const harvestE = Math.min(harvestS + t.harvest * 7, SEASON_END + 21);

    let suc = null;
    if (t.harvest <= 4 && t.days > 0 && !planted) {
      const h2s = harvestS + t.days, h2e = h2s + t.harvest * 7;
      if (h2s < SEASON_END) suc = { s2: harvestS, h2s, h2e: Math.min(h2e, SEASON_END + 7) };
    }

    rows.push({ def, t, preGermD, outdoorD, harvestS, harvestE, suc, planted });

    const k = type => id + type;
    const pgMon = new Date(year, 0, preGermD).getMonth() + 1;

    if (t.preGerm > 0 && !planted && pgMon === curMonth && !actSeen.has(k('sow'))) {
      actions.push({ type: 'sow', text: `Start ${def.name} seeds indoors`, def });
      actSeen.add(k('sow'));
    }
    if (!planted && def.outdoorMonth === curMonth && !actSeen.has(k('plant'))) {
      actions.push({ type: 'plant', text: `${t.preGerm > 0 ? 'Transplant' : 'Sow'} ${def.name} outdoors`, def });
      actSeen.add(k('plant'));
    }
    if (harvestS <= todayD + 14 && harvestE >= todayD && !actSeen.has(k('harvest'))) {
      actions.push({ type: 'harvest', text: `${def.name} ${harvestS <= todayD ? 'ready to harvest' : 'harvest starting soon'}`, def });
      actSeen.add(k('harvest'));
    }
    if (suc && suc.s2 >= todayD - 7 && suc.s2 <= todayD + 30 && !actSeen.has(k('succ'))) {
      actions.push({ type: 'succession', text: `Sow ${def.name} again for a second harvest`, def });
      actSeen.add(k('succ'));
    }

    // Fertiliser actions
    const feedCat = FEEDING[id];
    if (feedCat === 'heavy') {
      const prepMonth = def.outdoorMonth > 1 ? def.outdoorMonth - 1 : 12;
      const midMonth  = Math.min(def.outdoorMonth + 2, 12);
      if (prepMonth === curMonth && !actSeen.has(k('prep'))) {
        actions.push({ type: 'feed', text: `Prepare ${def.name} bed — dig in compost + slow-release fertilizer`, def });
        actSeen.add(k('prep'));
      }
      if (def.outdoorMonth === curMonth && !actSeen.has(k('feed1'))) {
        actions.push({ type: 'feed', text: `Feed ${def.name} with balanced NPK when planting out`, def });
        actSeen.add(k('feed1'));
      }
      if (midMonth === curMonth && !actSeen.has(k('feed2'))) {
        actions.push({ type: 'feed', text: `Mid-season top-feed ${def.name} with balanced NPK`, def });
        actSeen.add(k('feed2'));
      }
    }
    if (id === 'strawberry') {
      if (curMonth === 3 && !actSeen.has(k('straw_compost'))) {
        actions.push({ type: 'feed', text: `Top-dress strawberry bed with compost and rake in gently`, def });
        actSeen.add(k('straw_compost'));
      }
      if ((curMonth === 5 || curMonth === 6) && !actSeen.has(k('straw_k'))) {
        actions.push({ type: 'feed', text: `Apply potassium-rich feed to strawberries as they flower`, def });
        actSeen.add(k('straw_k'));
      }
    }
  });

  rows.sort((a, b) => a.outdoorD - b.outdoorD || a.def.name.localeCompare(b.def.name));

  const tp = parseFloat(pct(todayD));
  const mths = [
    {n:'Jan',d:1},{n:'Feb',d:32},{n:'Mar',d:60},{n:'Apr',d:91},{n:'May',d:121},
    {n:'Jun',d:152},{n:'Jul',d:182},{n:'Aug',d:213},{n:'Sep',d:244},{n:'Oct',d:274},{n:'Nov',d:305}
  ];
  const tagLbl = { sow:'Sow indoors', plant:'Plant out', harvest:'Harvest', succession:'Succession', feed:'Fertilise' };

  const rowsHtml = rows.map(r => {
    const bars = [];
    if (r.t.preGerm > 0) {
      const l = parseFloat(pct(r.preGermD)), w = Math.max(0.5, parseFloat(pct(r.outdoorD)) - l);
      bars.push(`<div class="plan-bar bar-sow" style="left:${l}%;width:${w}%" title="Sow indoors"></div>`);
    }
    if (r.t.days > 0) {
      const growStart = Math.max(PLAN_S, r.outdoorD);
      const l = parseFloat(pct(growStart)), w = Math.max(0.5, parseFloat(pct(r.harvestS)) - l);
      const growCls = r.def.overwinter && r.outdoorD < PLAN_S ? 'bar-overwinter' : 'bar-grow';
      bars.push(`<div class="plan-bar ${growCls}" style="left:${l}%;width:${w}%" title="${r.def.overwinter ? 'Overwintering — planted last autumn' : 'Growing outdoors'}"></div>`);
    }
    const hl = parseFloat(pct(r.harvestS)), hw = Math.max(0.5, parseFloat(pct(r.harvestE)) - hl);
    bars.push(`<div class="plan-bar bar-harvest" style="left:${hl}%;width:${hw}%" title="Harvest"></div>`);

    const dateVal = r.planted || '';
    const isSet = !!r.planted;
    const [selY, selM, selD] = isSet ? dateVal.split('-').map(Number) : [0, 0, 0];
    const MONTH_SEL_NAMES = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
    const monthOpts = MONTH_SEL_NAMES.map((n,i) =>
      `<option value="${i+1}"${selM===i+1?' selected':''}>${n}</option>`).join('');
    const dayOpts = Array.from({length:31},(_,i)=>i+1).map(d =>
      `<option value="${d}"${selD===d?' selected':''}>${d}</option>`).join('');
    const chipLabel = isSet
      ? `${MONTH_SEL_NAMES[selM-1]} ${selD}`
      : '';

    const succItems = succSuggestions(r.def.id, r.harvestS);
    const succRows = succItems.map(succ => {
      const sd = plantDef(succ.id);
      if (!sd) return '';
      const gl = pct(Math.min(succ.sowS, PLAN_E));
      const gw = Math.max(0.3, parseFloat(pct(Math.min(succ.growE, PLAN_E))) - parseFloat(gl));
      const hl = pct(Math.min(succ.growE, PLAN_E));
      const hw = Math.max(0.3, parseFloat(pct(Math.min(succ.harvE, PLAN_E))) - parseFloat(hl));
      return `<div class="plan-succ-row">
        <div class="plan-succ-row-label">
          <span class="plan-succ-row-arrow">↳</span>

        </div>
        <div class="plan-row-bars">
          <div class="plan-bars-track">

    const id = sel.dataset.id;
    const wrap = sel.closest('.plan-date-selects');
    const month = wrap.querySelector('.plan-month-sel').value;
    const day   = wrap.querySelector('.plan-day-sel').value;
    if (month && day) {
      const yr = new Date().getFullYear();

/* ── Sync modal ── */
function initSyncModal() {
  const el = document.createElement('div');
  el.id = 'sync-overlay';
  el.className = 'sf-overlay hidden';
  el.innerHTML = `<div class="sf-card">
    <div class="sf-title">☁ Cloud Sync</div>
    <p style="font-size:0.75rem;color:#666;margin-bottom:12px">Sync your garden plan across devices using a private GitHub Gist.<br>Paste your GitHub Personal Access Token (needs <strong>gist</strong> scope) and a Gist ID — or create a new Gist below.</p>
    <label class="sf-label" for="sync-pat">GitHub Personal Access Token</label>
    <input id="sync-pat" type="password" class="sf-select" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    <label class="sf-label" for="sync-gist-id" style="margin-top:10px">Gist ID</label>
    <input id="sync-gist-id" type="text" class="sf-select" placeholder="Leave blank to create a new Gist →" autocomplete="off" spellcheck="false">
    <div id="sync-status" style="font-size:0.7rem;color:#888;min-height:18px;margin-top:8px"></div>
    <div class="sf-footer" style="margin-top:10px;flex-wrap:wrap;gap:6px">
      <button class="sf-btn" id="sync-close">Close</button>
      <button class="sf-btn" id="sync-create">Create new Gist</button>
      <button class="sf-btn" id="sync-pull">Pull from Gist</button>
      <button class="sf-btn primary" id="sync-save">Save & Sync now</button>
    </div>
  </div>`;
  document.body.appendChild(el);

  document.getElementById('sync-close').addEventListener('click', () => el.classList.add('hidden'));
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden'); });

  document.getElementById('sync-create').addEventListener('click', async () => {
    const pat = document.getElementById('sync-pat').value.trim();
    if (!pat) { updateSyncStatus('Enter a PAT first.'); return; }
    updateSyncStatus('Creating Gist…');
    try {
      const payload = JSON.stringify({ beds, favPlants: [...favPlants], plantedDates, lastModified });
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { Authorization: `Bearer ${pat}`, 'Content-Type': 'application/json', 'X-GitHub-Api-Version': '2022-11-28' },
        body: JSON.stringify({ description: 'Garden Bed Planner — sfg-planner sync', public: false, files: { 'sfg-planner.json': { content: payload } } })
      });
      if (!res.ok) { updateSyncStatus('Error ' + res.status + ': check your PAT has gist scope'); return; }
      const data = await res.json();
      document.getElementById('sync-gist-id').value = data.id;
      localStorage.setItem('sfg-gist-pat', pat);
      localStorage.setItem('sfg-gist-id', data.id);
      setSyncIndicator(true);
      updateSyncStatus('✓ Gist created! Copy the Gist ID (' + data.id + ') to other devices.');
    } catch (e) { updateSyncStatus('Error: ' + e.message); }
  });

  document.getElementById('sync-save').addEventListener('click', async () => {
    const pat = document.getElementById('sync-pat').value.trim();
    const gistId = document.getElementById('sync-gist-id').value.trim();
    if (!pat || !gistId) { updateSyncStatus('Enter both PAT and Gist ID.'); return; }
    localStorage.setItem('sfg-gist-pat', pat);
    localStorage.setItem('sfg-gist-id', gistId);
    updateSyncStatus('Checking Gist…');
    try {
      const cloud = await syncFromGist();
      if (cloud && cloud.lastModified > lastModified) {
        applyState(cloud);
        localStorage.setItem('sfg-planner-v1', JSON.stringify({ beds, favPlants: [...favPlants], plantedDates, lastModified }));
        renderSidebar(); renderBeds(); renderPlanBody();
        setSyncIndicator(true);
        updateSyncStatus('✓ Pulled newer data from Gist (' + new Date(cloud.lastModified).toLocaleTimeString() + ')');
      } else {
        await syncToGist();
      }
    } catch(e) { updateSyncStatus('Error: ' + e.message); }
  });

  document.getElementById('sync-pull').addEventListener('click', async () => {
    updateSyncStatus('Pulling from Gist…');
    try {
      const cloud = await syncFromGist();
      if (!cloud) { updateSyncStatus('Nothing found in Gist.'); return; }
      applyState(cloud);
      localStorage.setItem('sfg-planner-v1', JSON.stringify({ beds, favPlants: [...favPlants], plantedDates, lastModified }));
      renderSidebar(); renderBeds(); renderPlanBody();
      setSyncIndicator(true);
      updateSyncStatus('✓ Pulled from Gist (' + new Date(cloud.lastModified).toLocaleTimeString() + ')');
    } catch(e) { updateSyncStatus('Error: ' + e.message); }
  });

  window._openSyncModal = () => {
    document.getElementById('sync-pat').value = localStorage.getItem('sfg-gist-pat') || '';
    document.getElementById('sync-gist-id').value = localStorage.getItem('sfg-gist-id') || '';
    const gistId = localStorage.getItem('sfg-gist-id');
    updateSyncStatus(gistId ? 'Connected to Gist ' + gistId : 'Not configured — create or enter a Gist ID');
    el.classList.remove('hidden');
  };
}

/* ── Drag engine ── */
const DRAG_THRESHOLD = 8;

function startDrag(e, plantId, source, srcBedId, srcCellIdx) {
  if (drag) cancelDrag(); // clean up any stuck state
  const def = plantDef(plantId);
  if (!def) return;
  drag = { plantId, source, srcBedId, srcCellIdx, def, startX: e.clientX, startY: e.clientY, live: false };
  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup',   onDragEnd);
  document.addEventListener('pointercancel', onDragCancel);
}

function promoteDrag(e) {
  // Called once threshold is exceeded — create ghost and lock scroll
  const { def } = drag;
  ghostEl = document.createElement('div');
  ghostEl.id = 'drag-ghost';
  ghostEl.style.background = def.bg;
  ghostEl.style.borderColor = def.color;
  ghostEl.innerHTML = `<span class="g-emoji">${plantIcon(def, 32)}</span><span class="g-count">×${def.perSqFt}</span>`;
  document.body.appendChild(ghostEl);
  positionGhost(e.clientX, e.clientY);
  drag.live = true;
}

function positionGhost(x, y) {
  if (!ghostEl) return;
  ghostEl.style.left = (x - CELL_PX / 2) + 'px';
  ghostEl.style.top  = (y - CELL_PX / 2) + 'px';
}

function onDragMove(e) {
  if (!drag) return;
  if (!drag.live) {
    const dx = e.clientX - drag.startX, dy = e.clientY - drag.startY;
    if (dx * dx + dy * dy < DRAG_THRESHOLD * DRAG_THRESHOLD) return;
    promoteDrag(e);
  }
  e.preventDefault();
  positionGhost(e.clientX, e.clientY);
  clearHighlight();
  const cellEl = sqCellAt(e.clientX, e.clientY);
  if (cellEl) {
    const occupied = cellEl.classList.contains('filled');
    cellEl.classList.add(occupied ? 'will-replace' : 'will-place');
    highlightedCellEl = cellEl;
  }
}

function cancelDrag() {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup',   onDragEnd);
  document.removeEventListener('pointercancel', onDragCancel);
  clearHighlight();
  if (ghostEl) { ghostEl.remove(); ghostEl = null; }
  if (sourcePaletteEl) { sourcePaletteEl.classList.remove('dragging-source'); sourcePaletteEl = null; }
  drag = null;
}

function onDragCancel() { cancelDrag(); }

function onDragEnd(e) {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup',   onDragEnd);
  document.removeEventListener('pointercancel', onDragCancel);

  clearHighlight();
  if (ghostEl) { ghostEl.remove(); ghostEl = null; }
  if (sourcePaletteEl) { sourcePaletteEl.classList.remove('dragging-source'); sourcePaletteEl = null; }

  if (!drag || !drag.live) { drag = null; return; }

  const cellEl = sqCellAt(e.clientX, e.clientY);
  if (cellEl) {
    const cellIdx = +cellEl.dataset.cellIdx;
    const bedId   = +cellEl.dataset.bedId;

    // Skip if dropped on same cell it came from
    const sameCell = drag.source === 'cell' && drag.srcBedId === bedId && drag.srcCellIdx === cellIdx;
    if (!sameCell) {
      // Clear source cell if moving
      if (drag.source === 'cell') {
        const srcBed = bedById(drag.srcBedId);
        if (srcBed) srcBed.cells[drag.srcCellIdx] = null;
      }
      const bed = bedById(bedId);
      if (bed) {
        bed.cells[cellIdx] = { type: drag.plantId };
        saveState();
        renderBeds();
      }
    }
  }

  drag = null;
}

function clearHighlight() {
  if (highlightedCellEl) {
    highlightedCellEl.classList.remove('will-place', 'will-replace');
    highlightedCellEl = null;
  }
}

function sqCellAt(x, y) {
  if (ghostEl) ghostEl.style.visibility = 'hidden';
  const el = document.elementFromPoint(x, y);
  if (ghostEl) ghostEl.style.visibility = '';
  return el ? el.closest('.sq-cell') : null;
}

/* ── Fill bed with single plant ── */
let fillDd = null;

function showFillDropdown(e, plantId) {
  if (fillDd) { fillDd.remove(); fillDd = null; }
  const dd = document.createElement('div');
  dd.className = 'fill-dd';
  beds.forEach(bed => {
    const opt = document.createElement('div');
    opt.className = 'fill-dd-item';
    opt.textContent = bed.name;
    opt.addEventListener('pointerdown', ev => {
      ev.preventDefault();
      ev.stopPropagation();
      fillBedWithPlant(bed.id, plantId);
      dd.remove(); fillDd = null;
    });
    dd.appendChild(opt);
  });
  const r = e.target.getBoundingClientRect();
  dd.style.left = (r.right + 6) + 'px';
  dd.style.top  = r.top + 'px';
  document.body.appendChild(dd);
  fillDd = dd;
  setTimeout(() => document.addEventListener('pointerdown', () => { dd.remove(); fillDd = null; }, { once: true }), 0);
}

function fillBedWithPlant(bedId, plantId) {
  const bed = bedById(bedId);
  const def = plantDef(plantId);
  if (!bed || !def) return;
  const empty = bed.cells.filter(c => !c).length;
  if (empty === 0) return;
  bed.cells = bed.cells.map(c => c || { type: plantId });
  saveState();
  renderBeds();
}

/* ── Plant tooltip ── */
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function buildPlantTooltip(plant) {
  const t = PLANT_TIMING[plant.id];
  const lines = [];

  const heightLabel = { tall: 'Tall (>80 cm)', medium: 'Medium (40–80 cm)', low: 'Low (<40 cm)' }[plant.height];
  lines.push(`${plant.perSqFt} per sq ft · ${heightLabel}`);

  if (t) {
    if (plant.overwinter) {
      lines.push(`🌱 Plant in autumn — overwinters in the ground`);
      lines.push(`🌾 Harvest: early summer (~${t.days} days)`);
    } else if (t.preGerm > 0) {
      const indoorIdx = ((plant.outdoorMonth - 1 - Math.round(t.preGerm / 4.33)) + 12) % 12;
      lines.push(`🌱 Start indoors: ${MN[indoorIdx]} (${t.preGerm} wks before planting out)`);
      lines.push(`🏡 Plant outdoors: from ${MN[plant.outdoorMonth - 1]}`);
      if (t.days > 0) {
        const hStart = Math.min(plant.outdoorMonth - 1 + Math.round(t.days / 30), 11);
        const hEnd   = Math.min(hStart + Math.round(t.harvest / 4), 11);
        lines.push(`🌾 Harvest: ~${t.days} days after planting · ${MN[hStart]}${hEnd !== hStart ? '–' + MN[hEnd] : ''}`);
      }
    } else {
      lines.push(`🌱 Sow direct outdoors: from ${MN[plant.outdoorMonth - 1]}`);
      if (t.days > 0) {
        const hStart = Math.min(plant.outdoorMonth - 1 + Math.round(t.days / 30), 11);
        const hEnd   = Math.min(hStart + Math.round(t.harvest / 4), 11);
        lines.push(`🌾 Harvest: ~${t.days} days after sowing · ${MN[hStart]}${hEnd !== hStart ? '–' + MN[hEnd] : ''}`);
      }
    }
  }

  if (t && t.harvest >= 12) lines.push(`✂️ Cut regularly to keep producing`);
  if (FEEDING_LABEL[FEEDING[plant.id]]) lines.push(FEEDING_LABEL[FEEDING[plant.id]]);
  if (PLANT_NOTES[plant.id])  lines.push(`💡 ${PLANT_NOTES[plant.id]}`);

  return lines.join('\n');
}

let plantTipEl = null;
let plantTipTimer = null;

function showPlantTip(anchorEl, plant) {
  clearTimeout(plantTipTimer);
  if (plantTipEl) { plantTipEl.remove(); plantTipEl = null; }
  const r = anchorEl.getBoundingClientRect();
  plantTipEl = document.createElement('div');
  plantTipEl.className = 'plant-tip-popup';
  plantTipEl.textContent = buildPlantTooltip(plant);
  plantTipEl.style.left = (r.right + 10) + 'px';
  plantTipEl.style.top  = (r.top + r.height / 2) + 'px';
  document.body.appendChild(plantTipEl);
  // Clamp so it doesn't overflow viewport vertically
  const pr = plantTipEl.getBoundingClientRect();
  if (pr.bottom > window.innerHeight - 6)
    plantTipEl.style.top = (window.innerHeight - pr.height - 6) + 'px';
  if (pr.top < 6)
    plantTipEl.style.top = '6px';
}

function hidePlantTip() {
  clearTimeout(plantTipTimer);
  plantTipTimer = setTimeout(() => {
    if (plantTipEl) { plantTipEl.remove(); plantTipEl = null; }
  }, 300);
}

/* ── Sidebar ── */
function renderSidebar() {
  // Update title: show marked count + clear link
  const titleEl = document.querySelector('.sidebar-title');
  const cnt = favPlants.size;
  if (cnt > 0) {
    titleEl.innerHTML = `Plants <span class="sidebar-fav-count">· ${cnt} marked</span><span class="sidebar-fav-clear" id="fav-clear-btn">clear</span>`;
    document.getElementById('fav-clear-btn').addEventListener('click', e => {
      e.stopPropagation();
      favPlants.clear();
      saveState();
      renderSidebar();
    });
  } else {
    titleEl.textContent = 'Plants';
  }

  const el = document.getElementById('palette');
  el.innerHTML = '';
  const cats = [...new Set(PLANTS.map(p => p.cat))];
  cats.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'section-header';
    h.textContent = cat;
    el.appendChild(h);

    PLANTS.filter(p => p.cat === cat).forEach(plant => {
      const marked = favPlants.has(plant.id);
      const item = document.createElement('div');
      item.className = 'plant-item' + (marked ? ' fav' : '');
      item.innerHTML = `
        <span class="pi-dot${marked ? ' marked' : ''}" title="Mark for Smart Fill"></span>
        <span class="pi-emoji">${plantIcon(plant, 22)}</span>
        <div class="pi-info">
          <div class="pi-name">${plant.name}</div>
          <div class="pi-sfg">${plant.perSqFt}/sq ft</div>
        </div>
        <div class="pi-badge">×${plant.perSqFt}</div>
        <span class="pi-fill" title="Fill a bed with this plant">fill</span>
      `;
      item.querySelector('.pi-fill').addEventListener('pointerdown', e => {
        e.preventDefault();
        e.stopPropagation();
        showFillDropdown(e, plant.id);
      });
      item.querySelector('.pi-dot').addEventListener('pointerdown', e => {
        e.preventDefault();
        e.stopPropagation();
        if (favPlants.has(plant.id)) favPlants.delete(plant.id);
        else favPlants.add(plant.id);
        saveState();
        renderSidebar();
      });
      item.addEventListener('pointerdown', e => {
        if (e.button !== 0) return;
        sourcePaletteEl = item;
        item.classList.add('dragging-source');
        startDrag(e, plant.id, 'palette', null, null);
      });
      item.addEventListener('mouseenter', () => showPlantTip(item, plant));
      item.addEventListener('mouseleave', hidePlantTip);
      el.appendChild(item);
    });
  });
}

  snap_peas:  'Fixes nitrogen, enriching the soil',
  edamame:    'Fixes nitrogen, enriching the soil',
};

/* ── Bed guidance ── */
function buildBedGuidance(bed) {
  const plantedIds = [...new Set(bed.cells.filter(Boolean).map(c => c.type))];
  const el = document.createElement('div');
  el.className = 'bed-guidance';

  if (plantedIds.length === 0) { el.style.display = 'none'; return el; }

  const tips = [];

  // 1. Conflicts – most important, show first
  for (let i = 0; i < plantedIds.length && tips.length < 2; i++) {
    for (let j = i + 1; j < plantedIds.length && tips.length < 2; j++) {
      const a = plantDef(plantedIds[i]), b = plantDef(plantedIds[j]);
      if (!a || !b) continue;
      if (a.avoid.includes(b.id) || b.avoid.includes(a.id))
        tips.push(`<div class="bed-guidance-item bed-guidance-warn"><span class="bed-guidance-icon">⚠️</span><span>${a.name} and ${b.name} don't grow well together</span></div>`);
    }
  }

  // 2. Height warning: tall plants in south columns (4-5) shade shorter ones
  const tallInSouth = bed.cells.some((c, i) => {
    if (!c) return false;
    const d = plantDef(c.type);
    return d && d.height === 'tall' && (i % GRID_COLS) >= 4;
  });
  if (tallInSouth)
    tips.push(`<div class="bed-guidance-item bed-guidance-warn"><span class="bed-guidance-icon">☀️</span><span>Tall plants in south columns may shade neighbours — move them to the north (left) side</span></div>`);

  // 3. Good companion pairs already present
  const goodPairs = [];
  for (let i = 0; i < plantedIds.length; i++) {
    for (let j = i + 1; j < plantedIds.length; j++) {
      const a = plantDef(plantedIds[i]), b = plantDef(plantedIds[j]);
      if (!a || !b) continue;
      if ((a.companions.includes(b.id) || b.companions.includes(a.id)) && !a.avoid.includes(b.id) && !b.avoid.includes(a.id))
        goodPairs.push(`${a.name} + ${b.name}`);
    }
  }
  if (goodPairs.length)
    tips.push(`<div class="bed-guidance-item bed-guidance-good"><span class="bed-guidance-icon">✅</span><span>Good pairing: ${goodPairs.slice(0, 2).join(' · ')}</span></div>`);

  // 4. Nitrogen bonus: legumes + heavy feeders
  const legume = plantedIds.find(id => plantDef(id)?.cat === 'Legumes');
  const feeder = plantedIds.find(id => ['tomato','cherry_tomato','pepper','eggplant','zucchini','cucumber','broccoli','cauliflower','kale'].includes(id));
  if (legume && feeder)
    tips.push(`<div class="bed-guidance-item"><span class="bed-guidance-icon">🌿</span><span>${plantDef(legume).name} fixes nitrogen in the soil, giving ${plantDef(feeder).name} a boost</span></div>`);

  // 5. Soil & feeding needs
  const feedCats = [...new Set(plantedIds.map(id => FEEDING[id]).filter(Boolean))];
  const hasHeavy = feedCats.includes('heavy');
  const hasLight = feedCats.includes('light');
  const hasFixer = feedCats.includes('fixer');
  if (hasHeavy && hasLight)
    tips.push(`<div class="bed-guidance-item bed-guidance-warn"><span class="bed-guidance-icon">⚠️</span><span>Mixed feeding needs — heavy feeders need rich compost; light feeders (herbs) prefer lean soil. Consider separating them.</span></div>`);
  else if (hasHeavy)
    tips.push(`<div class="bed-guidance-item"><span class="bed-guidance-icon">🪣</span><span>Heavy feeders — enrich with compost + balanced NPK before planting; top-feed mid-season</span></div>`);
  else if (hasLight && !hasFixer)
    tips.push(`<div class="bed-guidance-item"><span class="bed-guidance-icon">🪣</span><span>Light feeders — avoid over-fertilising; lean soil concentrates flavour in herbs</span></div>`);

  // 6. Suggestions: plants (incl. flowers) that would complement what's here
  {
    const suggested = [];
    // Bidirectional: scan all PLANTS, not just companions of planted plants
    PLANTS.forEach(candidate => {
      if (plantedIds.includes(candidate.id) || suggested.includes(candidate.id)) return;
      const isCompanion = plantedIds.some(pid => {
        const pd = plantDef(pid);
        return pd && (pd.companions.includes(candidate.id) || candidate.companions.includes(pid));
      });
      if (!isCompanion) return;
      const safe = !plantedIds.some(pid => {
        const pd = plantDef(pid);
        return pd && (pd.avoid.includes(candidate.id) || candidate.avoid.includes(pid));
      });
      if (safe) suggested.push(candidate.id);
    });
    if (suggested.length) {
      const items = suggested.slice(0, 3).map(id => {
        const d = plantDef(id);
        const withNames = plantedIds
          .filter(pid => { const pd = plantDef(pid); return pd && (pd.companions.includes(id) || d.companions.includes(pid)); })
          .map(pid => plantDef(pid).name);
        const parts = [];
        if (PLANT_NOTES[id]) parts.push(PLANT_NOTES[id]);
        if (withNames.length) parts.push(`Good with: ${withNames.join(', ')}`);
        const tip = parts.join(' · ');
        return `<span class="bed-suggest-tag" data-tip="${tip}" title="${tip}">${d.emoji} ${d.name}</span>`;
      }).join(' &nbsp;·&nbsp; ');
      tips.push(`<div class="bed-guidance-item"><span class="bed-guidance-icon">💡</span><span>Try adding: ${items}</span></div>`);
    }
  }

  el.innerHTML = tips.join('');
  return el;
}

/* ── Beds ── */
function renderBeds() {
  const grid = document.getElementById('bedsGrid');
  grid.innerHTML = '';
  beds.forEach(bed => grid.appendChild(buildBedWrap(bed)));
}

function buildBedWrap(bed) {
  const wrap = document.createElement('div');
  wrap.className = 'bed-wrap';

  // Label row
  const labelRow = document.createElement('div');
  labelRow.className = 'bed-label-row';

  const nameEl = document.createElement('div');
  nameEl.className = 'bed-name';
  nameEl.contentEditable = true;
  nameEl.spellcheck = false;
  nameEl.textContent = bed.name;
  nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });
  nameEl.addEventListener('blur', () => {
    const v = nameEl.textContent.trim();
    bed.name = v || bed.name;
    nameEl.textContent = bed.name;
    saveState();
  });

  const st = bedStats(bed);
  const statsEl = document.createElement('span');
  statsEl.className = 'bed-stats';
  if (st.filled > 0) {
    statsEl.textContent = `${st.filled}/18 sq ft · ${st.totalPlants} plants`;
  }

  const clearBtn = document.createElement('span');
  clearBtn.className = 'bed-clear';
  clearBtn.textContent = 'Clear';
  clearBtn.addEventListener('click', () => {
    if (!bed.cells.some(Boolean)) return;
    if (confirm(`Clear all plants from "${bed.name}"?`)) {
      bed.cells = Array(GRID_TOTAL).fill(null);
      saveState();
      renderBeds();
    }
  });

  const dimsEl = document.createElement('span');
  dimsEl.className = 'bed-dims';
  dimsEl.textContent = '6 × 3 sq ft';

  const smartBtn = document.createElement('span');
  smartBtn.className = 'bed-smartfill';
  smartBtn.textContent = '⟳ Smart Fill';
  smartBtn.addEventListener('click', () => openSmartFill(bed));

  labelRow.append(nameEl, statsEl, clearBtn, smartBtn, dimsEl);

  // Bed (CSS grid)
  const bedEl = document.createElement('div');
  bedEl.className = 'bed';
  bedEl.dataset.bedId = bed.id;

  for (let i = 0; i < GRID_TOTAL; i++) {
    bedEl.appendChild(buildCell(bed, i));
  }

  const compassEl = document.createElement('div');
  compassEl.className = 'bed-compass';
  compassEl.innerHTML = '<span>← North</span><span>South →</span>';

  wrap.append(labelRow, bedEl, compassEl, buildBedGuidance(bed));
  return wrap;
}

function buildCell(bed, cellIdx) {
  const cellData = bed.cells[cellIdx];
  const el = document.createElement('div');
  el.className = 'sq-cell';
  el.dataset.cellIdx = cellIdx;
  el.dataset.bedId = bed.id;

  if (cellData) {
    const def = plantDef(cellData.type);
    if (def) {
      el.classList.add('filled');
      el.style.background = def.bg;
      el.style.borderColor = def.color;
      el.innerHTML = `
        <span class="x-btn" title="Remove">×</span>
        <span class="cell-emoji">${plantIcon(def, 30)}</span>
        <span class="cell-name">${def.name}</span>
        <span class="cell-count">×${def.perSqFt}</span>
      `;
      el.querySelector('.x-btn').addEventListener('click', e => {
        e.stopPropagation();
        bed.cells[cellIdx] = null;
        saveState();
        renderBeds();
      });
      el.addEventListener('pointerdown', e => {
        if (e.button !== 0 || e.target.classList.contains('x-btn')) return;
        e.preventDefault();
        e.stopPropagation();
        startDrag(e, cellData.type, 'cell', bed.id, cellIdx);
      });
      el.addEventListener('mouseenter', () => showPlantTip(el, def));
      el.addEventListener('mouseleave', hidePlantTip);
    }
  } else {
    el.classList.add('empty');
  }

  return el;
}

/* ── Init ── */
document.addEventListener('visibilitychange', () => { if (document.hidden && drag) cancelDrag(); });

loadState();
renderSidebar();
renderBeds();
initPlanSection();
initSfModal();
initSyncModal();
// On startup, prefer cloud state if it's newer than what's in localStorage
syncFromGist().then(cloud => {
  if (!cloud) return;
  if (cloud.lastModified > lastModified) {
    applyState(cloud);
    localStorage.setItem('sfg-planner-v1', JSON.stringify({ beds, favPlants: [...favPlants], plantedDates, lastModified }));
    renderSidebar();
    renderBeds();
    renderPlanBody();
    setSyncIndicator(true);
  } else {
    setSyncIndicator(true);
  }
}).catch(() => {});
</script>
